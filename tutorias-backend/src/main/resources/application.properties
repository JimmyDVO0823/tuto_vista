# Configuración de la Base de Datos (Neon)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-old-mountain-apwqgc3i-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logs
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.orm.jpa=INFO

# Puerto (Railway asigna el puerto dinámicamente via variable PORT)
server.port=${PORT:8081}


# Configuración del servidor de correos (BREVO API - HTTP)
# Usamos la API de Brevo por el puerto 443 (HTTPS) para evitar bloqueos de SMTP en Railway
brevo.api.url=${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL:jimmyvelandia@outlook.es}
brevo.sender.name=${BREVO_SENDER_NAME:Plataforma de Tutorías}