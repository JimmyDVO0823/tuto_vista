<html lang="en">
  <script type="text/javascript">
    // Revisa si venimos de una redirección por 404
    (function (l) {
      if (l.search[1] === "p") {
        var pairs = l.search.slice(1).split("&");
        var query = {};
        pairs.forEach(function (pair) {
          var keyVal = pair.split("=");
          query[keyVal[0]] = decodeURIComponent(keyVal[1] || "");
        });
        if (query.p !== undefined) {
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, l.pathname.length - (query.p || "").length) +
              query.p.replace(/~and~/g, "&") +
              l.hash,
          );
        }
      }
    })(window.location);
  </script>
